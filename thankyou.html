<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Decent Global School Bikaner</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1F2F5A',
                        secondary: '#F47C20',
                        darkBg: '#0F172A',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        heading: ['Playfair Display', 'serif'],
                    },
                    animation: {
                        'check-bounce': 'bounce 1s ease-in-out infinite',
                        'fade-in': 'fadeIn 1s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        /* Hero Mesh Gradient (Matching your Main Design) */
        .thank-you-mesh {
            background-color: #1F2F5A;
            background-image: 
                radial-gradient(at 0% 0%, hsla(22, 90%, 54%, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(208, 45%, 79%, 0.15) 0px, transparent 50%);
        }
        .dark .thank-you-mesh {
            background-color: #0F172A;
        }

        /* Success Icon Animation */
        .success-circle {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dash 2s ease-in-out forwards;
        }
        @keyframes dash { to { stroke-dashoffset: 0; } }
    </style>
</head>

<body class="thank-you-mesh min-h-screen flex items-center justify-center p-6 transition-colors duration-300 overflow-hidden">

    <div class="max-w-2xl w-full text-center z-10 animate-fade-in">
        
        <div class="mb-10 flex justify-center">
            <div class="w-24 h-24 bg-secondary/20 rounded-full flex items-center justify-center relative shadow-2xl shadow-secondary/20">
                <svg class="w-12 h-12 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path class="success-circle" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
                <div class="absolute inset-0 border-2 border-secondary/30 rounded-full animate-ping"></div>
            </div>
        </div>

        <h1 class="text-5xl md:text-6xl font-heading font-extrabold text-white mb-6 leading-tight">
            Thank You <br> <span class="text-secondary italic">For Reaching Out!</span>
        </h1>
        
        <p class="text-white/70 text-lg md:text-xl mb-12 max-w-lg mx-auto leading-relaxed font-sans">
            Your admission enquiry has been submitted successfully. <br>
            <span class="text-white font-semibold">Our team will contact you soon.</span>
        </p>

        <div class="flex flex-col items-center gap-6">
            <a href="html.html" class="bg-secondary text-white px-10 py-4 rounded-xl font-bold text-sm shadow-xl shadow-secondary/30 hover:-translate-y-1 transition-all inline-block uppercase tracking-widest">
                Back to Home
            </a>
            <p class="text-white/30 text-[10px] uppercase tracking-[0.4em]">
                Redirecting in <span id="timer">8</span> seconds...
            </p>
        </div>

    </div>

    <div class="absolute top-1/4 left-10 w-64 h-64 bg-secondary/5 rounded-full blur-3xl opacity-50"></div>
    <div class="absolute bottom-1/4 right-10 w-96 h-96 bg-accent/10 rounded-full blur-3xl opacity-30"></div>

    <script>
        // Automatic Theme Detection (Main page se match karega)
        if (localStorage.getItem('dgs-theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }

        // Countdown Redirect Logic
        let seconds = 8;
        const timerElement = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            seconds--;
            timerElement.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.href = "index.html"; // Change this to your main file name
            }
        }, 1000);
    </script>
</body>
</html>
